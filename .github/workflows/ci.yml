name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel any older, still-running CI run for the same branch when a new one
# starts (e.g. a superseding push), instead of letting a hung run linger.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # No Android emulator in this job: this only verifies the project
      # (main + test sources) compiles cleanly.
      - name: Compile
        run: mvn -B -q compile test-compile

  appium-emulator-tests:
    name: Run Appium tests on Android emulator
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js (for the Appium server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and the UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # GitHub-hosted Linux runners support nested virtualization (KVM), which
      # the Android emulator needs for hardware acceleration.
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-31

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD snapshot created for caching."

      # config.json targets platformVersion 12.0 (API 31) and deviceName
      # emulator-5554, which matches this action's default emulator serial.
      - name: Run Appium + Cucumber tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # This action runs each line of `script` as its own /usr/bin/sh invocation
          # (not one continuous shell), so state can't be kept in shell variables or
          # `&` job control across lines - a PID file is used instead. Appium's
          # stdout/stderr must also be redirected away: left inherited, the
          # backgrounded process keeps the step's output pipe open forever after the
          # script "finishes", so the step never reports completion (hangs the job).
          script: |
            appium --base-path / --log-timestamp > /tmp/appium.log 2>&1 & echo $! > /tmp/appium.pid
            timeout 60 sh -c 'until curl -sf http://localhost:4723/status; do sleep 2; done'
            mvn -B test -Dcucumber.filter.tags="@Regression"
            kill "$(cat /tmp/appium.pid)" 2>/dev/null || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-reports
          path: |
            reports/
            target-*/allure-results/

  # The ai-analysis job (ai.Cli-based failure analysis) is removed while the
  # src/main/java/ai package is temporarily out of the codebase; re-add it
  # alongside that package.
