name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # No Android emulator in this job: this only verifies the project
      # (main + test sources, including the AI layer) compiles cleanly.
      - name: Compile
        run: mvn -B -q compile test-compile

  appium-emulator-tests:
    name: Run Appium tests on Android emulator
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js (for the Appium server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and the UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # GitHub-hosted Linux runners support nested virtualization (KVM), which
      # the Android emulator needs for hardware acceleration.
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-31

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD snapshot created for caching."

      # config.json targets platformVersion 12.0 (API 31) and deviceName
      # emulator-5554, which matches this action's default emulator serial.
      - name: Run Appium + Cucumber tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            appium --base-path / --log-timestamp &
            APPIUM_PID=$!
            for i in $(seq 1 30); do
              curl -sf http://localhost:4723/status && break
              sleep 2
            done
            mvn -B test -Dcucumber.filter.tags="@Regression"
            kill "$APPIUM_PID" || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-reports
          path: |
            reports/
            target-*/allure-results/

  ai-analysis:
    name: AI failure analysis (demo)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Runs the AI Failure Analyzer against a checked-in sample report
      # (src/test/resources/fixtures) since this job doesn't run real
      # Appium/emulator tests. Demonstrates the ai.Cli "analyze" flow in CI.
      # Job-level `if:` can't see the secrets context, so each step is guarded
      # individually and the job is simply a no-op when the key isn't set.
      - name: Run AI failure analyzer on sample report
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >
          mvn -q compile exec:java
          -Dexec.args="analyze src/test/resources/fixtures/sample-cucumber-report.json"

      - name: Upload AI analysis report
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis
          path: reports/ai-analysis.md
